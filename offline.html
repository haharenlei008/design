<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>宝宝投影灯首页 - 设备不在线</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="stage-shell" id="stageShell">
      <main class="app is-offline" id="app" data-mode="story" data-device-status="offline" aria-label="宝宝投影灯首页">
        <div class="scene-bg" id="sceneBg"></div>
        <div class="scene-bg scene-bg-next" id="sceneBgNext" aria-hidden="true"></div>
        <div class="mode-effects" id="modeEffects" aria-hidden="true"></div>
        <div class="scene-vignette"></div>

        <header class="topbar" aria-label="设备状态">
          <div class="device-copy">
            <button class="device-name device-switcher is-device-offline" id="deviceSwitcherButton" type="button" aria-haspopup="true" aria-expanded="false" aria-controls="deviceMenu">
              <span class="device-name-text" id="deviceNameText">宝宝投影灯</span>
              <span class="online-dot" aria-label="不在线"></span>
              <svg class="device-chevron" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                <path d="M7 10l5 5 5-5"></path>
              </svg>
            </button>
            <div class="device-status" id="deviceStatusText">设备不在线</div>
            <div class="device-menu" id="deviceMenu" aria-hidden="true">
              <button class="device-option is-active" type="button" data-device-name="宝宝投影灯" data-device-status="offline" aria-pressed="true">
                <span class="device-option-copy">
                  <strong>宝宝投影灯</strong>
                  <small>儿童房 · 不在线</small>
                </span>
                <span class="device-option-mark" aria-hidden="true">✓</span>
              </button>
              <button class="device-option" type="button" data-device-name="备用投影灯" data-device-status="offline" aria-pressed="false">
                <span class="device-option-copy">
                  <strong>备用投影灯</strong>
                  <small>书房 · 不在线</small>
                </span>
                <span class="device-option-mark" aria-hidden="true">✓</span>
              </button>
              <button class="device-add-button" type="button" data-device-add>
                <span class="device-add-icon" aria-hidden="true">
                  <svg viewBox="0 0 24 24" focusable="false">
                    <path d="M12 5v14"></path>
                    <path d="M5 12h14"></path>
                  </svg>
                </span>
                <span>添加设备</span>
              </button>
              <p class="device-menu-hint" id="deviceMenuHint" aria-live="polite"></p>
            </div>
          </div>
          <button class="avatar-button" id="avatarButton" type="button" aria-label="打开功能中心" aria-expanded="false">
            <span class="avatar-face" aria-hidden="true">👦</span>
          </button>
        </header>

        <div class="device-effect-actions" aria-label="场景效果">
          <button class="mini-action scene-effect-mini" id="sceneEffectOnButton" type="button" aria-label="开启场景效果" aria-disabled="true" disabled>
            <span class="mini-effect-icon" aria-hidden="true">✦</span>
            <span>开启效果</span>
          </button>
          <button class="mini-action scene-effect-mini" id="sceneEffectOffButton" type="button" aria-label="关闭场景效果" aria-disabled="true" disabled>
            <span class="mini-effect-icon" aria-hidden="true">○</span>
            <span>关闭效果</span>
          </button>
        </div>

        <section class="mode-summary" aria-label="当前模式">
          <div class="mode-copy" id="modeCopy">
            <div class="mode-title-line">
              <span class="mode-symbol" id="modeSymbol" aria-hidden="true">📖</span>
              <h1 id="modeTitle">故事模式</h1>
            </div>
            <p id="modeSubtitle">会讲故事的好伙伴</p>
          </div>

          <div class="mini-actions" aria-label="快捷功能">
            <button class="mini-action stop-play-mini" id="stopPlayButton" type="button" aria-label="停止播放" aria-disabled="true" disabled>
              <span class="mini-stop-icon" aria-hidden="true"></span>
              <span>停止</span>
            </button>
          </div>
        </section>

        <nav class="mode-grid" aria-label="模式选择">
          <button class="mode-card is-active" type="button" data-mode="story" aria-label="故事模式">
            <img src="./图片/模式插图-故事模式.png" alt="" />
            <span>故事模式</span>
          </button>
          <button class="mode-card" type="button" data-mode="music" aria-label="儿歌模式">
            <img src="./图片/模式插图-音乐模式.png" alt="" />
            <span>儿歌模式</span>
          </button>
          <button class="mode-card" type="button" data-mode="sleep" aria-label="睡眠模式">
            <img src="./图片/模式插图-睡眠模式.png" alt="" />
            <span>睡眠模式</span>
          </button>
          <button class="mode-card" type="button" data-mode="parent" aria-label="亲子模式">
            <img src="./图片/模式插图-亲子模式.png" alt="" />
            <span>亲子模式</span>
          </button>
        </nav>

        <div class="page-dots" aria-hidden="true">
          <span class="is-active"></span>
          <span></span>
          <span></span>
        </div>

        <section class="play-panel" id="playPanel" aria-label="随机播放">
          <a class="content-library-button content-library-button--side" id="contentLibraryButton" href="./content-library.html?device=offline" aria-label="进入内容库">
            <span class="content-library-icon" aria-hidden="true">
              <svg viewBox="0 0 48 48" focusable="false">
                <path d="M10 13h12l4 5h12v18H10z"></path>
                <path d="M15 25h18"></path>
                <path d="M15 31h12"></path>
              </svg>
            </span>
            <span>内容库</span>
          </a>
          <div class="play-left">
            <div class="play-copy">
              <p id="playTitle">星星城堡历险记</p>
              <small id="playSubtitle">随机讲一个睡前故事</small>
            </div>
          </div>
          <div class="play-actions" aria-label="随机播放">
            <button class="random-button" type="button" aria-label="随机播放" aria-disabled="true" disabled>
              <img src="./图标/图标1.png" alt="" />
              <span>随机播放</span>
            </button>
          </div>
        </section>

        <section class="ai-panel" aria-label="AI生成">
          <div class="ai-left">
            <span class="ai-spark-wrap" aria-hidden="true">
              <svg class="ai-spark" viewBox="0 0 64 64" focusable="false">
                <path class="ai-orbit" d="M14 34c7-13 27-20 38-11 8 7-1 21-18 25-15 3-29-3-31-12-1-5 3-10 11-14"></path>
                <rect class="ai-core" x="17" y="18" width="30" height="28" rx="14"></rect>
                <path class="ai-line" d="M25 37l4-14 4 14"></path>
                <path class="ai-line" d="M27 32h4"></path>
                <path class="ai-line" d="M39 23v14"></path>
                <path class="ai-star" d="M50 9l2 5 5 2-5 2-2 5-2-5-5-2 5-2z"></path>
              </svg>
            </span>
            <div class="ai-copy">
              <span class="ai-kicker">AI 创作</span>
              <p id="aiPrompt">想听什么故事？</p>
            </div>
          </div>
          <button class="generate-button" id="generateButton" type="button" aria-label="立即生成" aria-disabled="true" disabled>
            <span class="generate-spark" aria-hidden="true">✦</span>
            <span>立即生成</span>
          </button>
        </section>

        <footer class="quick-controls" aria-label="快捷控制">
          <button class="quick-control" type="button" data-control="light" aria-label="打开灯光设置" aria-disabled="true" disabled>
            <span class="quick-icon"><img src="./图标/图标5.png" alt="" /></span>
            <span class="quick-label">灯光</span>
            <small id="lightQuickValue">设备离线</small>
          </button>
          <button class="quick-control quick-control-primary" type="button" data-control="voice" aria-label="语音" aria-disabled="true" disabled>
            <span class="quick-icon"><img src="./图标/图标2.png" alt="" /></span>
            <span class="quick-label">语音</span>
            <span class="voice-record-badge" id="voiceRecordBadge" aria-live="polite">按住</span>
          </button>
          <button class="quick-control" type="button" data-control="rotation" aria-label="切换投影旋转" aria-disabled="true" disabled>
            <span class="quick-icon"><img src="./图标/图标10.png" alt="" /></span>
            <span class="quick-label">旋转</span>
            <small id="rotationQuickValue">设备离线</small>
          </button>
        </footer>

        <section class="light-control-panel" id="lightControlPanel" aria-label="灯光设置" aria-hidden="true">
          <button class="scene-panel-close" id="closeLightPanelButton" type="button" aria-label="关闭灯光设置" disabled>×</button>
          <div class="scene-panel-head">
            <div>
              <p>灯光设置</p>
              <small id="lightPanelHint">设备在线后可调节灯光和旋转</small>
            </div>
            <span class="scene-motion-status" id="lightModeStatus">设备不在线</span>
          </div>
          <div class="segmented-grid light-effect-grid" role="group" aria-label="灯光模式">
            <button class="segment-button" type="button" data-light-effect="crossfade" disabled>渐变</button>
            <button class="segment-button" type="button" data-light-effect="marquee" disabled>跑马</button>
            <button class="segment-button" type="button" data-light-effect="breathe" disabled>呼吸</button>
            <button class="segment-button" type="button" data-light-effect="steady" disabled>长亮</button>
          </div>
          <label class="setting-row effect-speed-row" for="effectSpeedRange">
            <span>执行速度</span>
            <strong id="effectSpeedValue">--</strong>
            <input id="effectSpeedRange" type="range" min="50" max="2000" value="800" disabled />
          </label>
          <label class="setting-row overall-intensity-row" for="lightIntensityRange">
            <span>整体亮度</span>
            <strong id="lightIntensityValue">--</strong>
            <input id="lightIntensityRange" type="range" min="1" max="100" value="65" disabled />
          </label>
          <div class="steady-channel-settings" id="steadyChannelSettings" aria-label="长亮三色亮度">
            <label class="setting-row channel-row" for="steadyRedRange">
              <span>红光亮度</span>
              <strong id="steadyRedValue">--</strong>
              <input id="steadyRedRange" type="range" min="0" max="100" value="65" disabled />
            </label>
            <label class="setting-row channel-row" for="steadyYellowRange">
              <span>黄光亮度</span>
              <strong id="steadyYellowValue">--</strong>
              <input id="steadyYellowRange" type="range" min="0" max="100" value="65" disabled />
            </label>
            <label class="setting-row channel-row" for="steadyBlueRange">
              <span>蓝光亮度</span>
              <strong id="steadyBlueValue">--</strong>
              <input id="steadyBlueRange" type="range" min="0" max="100" value="65" disabled />
            </label>
          </div>
          <button class="scene-off-button" id="turnOffSceneEffectsButton" type="button" disabled>关闭灯光</button>
        </section>

        <section class="rotation-control-panel" id="rotationControlPanel" aria-label="旋转设置" aria-hidden="true">
          <button class="scene-panel-close" id="closeRotationPanelButton" type="button" aria-label="关闭旋转设置" disabled>×</button>
          <div class="scene-panel-head">
            <div>
              <p>旋转设置</p>
              <small id="rotationPanelHint">设备在线后可调节灯光和旋转</small>
            </div>
            <span class="scene-motion-status" id="projectionMotionStatus">设备不在线</span>
          </div>
          <div class="segmented-grid rotation-speed-grid" role="group" aria-label="旋转速度">
            <button class="segment-button" type="button" data-rotation-speed="1" disabled>
              <strong>低速</strong>
              <small>轻轻转动</small>
            </button>
            <button class="segment-button" type="button" data-rotation-speed="2" disabled>
              <strong>中速</strong>
              <small>互动节奏</small>
            </button>
            <button class="segment-button" type="button" data-rotation-speed="3" disabled>
              <strong>高速</strong>
              <small>更有律动</small>
            </button>
          </div>
          <button class="rotation-stop-button" type="button" data-rotation-speed="0" disabled>停止旋转</button>
        </section>

        <div class="control-toast" id="controlToast" role="status" aria-hidden="true"></div>

        <section class="voice-review-panel" id="voiceReviewPanel" aria-label="语音录音" aria-hidden="true">
          <button class="voice-review-close" id="closeVoiceReviewButton" type="button" aria-label="关闭录音面板" disabled>×</button>
          <div class="voice-review-head">
            <div class="voice-wave" aria-hidden="true">
              <span></span>
              <span></span>
              <span></span>
              <span></span>
            </div>
            <div class="voice-review-copy">
              <strong id="voicePanelTitle">正在准备录音</strong>
              <small id="voicePanelHint">设备在线后可发送语音 · <span id="voiceDuration">00:00</span></small>
            </div>
          </div>
          <audio id="voicePlayback" preload="metadata"></audio>
          <div class="voice-review-actions">
            <button class="voice-action secondary" id="voicePlayButton" type="button" disabled>试听</button>
            <button class="voice-action primary" id="sendVoiceButton" type="button" disabled>发送到设备播放</button>
          </div>
        </section>

        <div class="menu-backdrop" id="menuBackdrop"></div>
        <aside class="side-menu" id="sideMenu" aria-label="功能中心" aria-hidden="true">
          <button class="menu-close" type="button" aria-label="关闭功能中心">×</button>

          <div class="menu-profile">
            <div class="menu-avatar"><span>👦</span></div>
            <div class="menu-profile-copy">
              <strong>小宇宙宝宝</strong>
              <small>今晚也有一盏灯陪着你</small>
              <span class="menu-account">登录账号：138****8888</span>
              <span class="menu-device-status is-offline">设备不在线</span>
            </div>
          </div>

          <section class="menu-section" aria-label="主功能">
            <div class="menu-section-title">主功能</div>
            <div class="menu-primary-grid">
              <button class="menu-action menu-primary-action" type="button" data-menu-action="play-history" aria-controls="playHistoryPanel">
                <span class="menu-action-icon" aria-hidden="true">
                  <svg viewBox="0 0 48 48" focusable="false">
                    <circle cx="24" cy="24" r="15"></circle>
                    <path d="M24 14v11l8 5"></path>
                    <path d="M15 11h-6v6"></path>
                  </svg>
                </span>
                <span class="menu-item-copy">
                  <strong>播放记录</strong>
                  <small>查看最近播放与生成内容</small>
                </span>
              </button>
              <button class="menu-action menu-primary-action" type="button" data-menu-action="device-settings">
                <span class="menu-action-icon" aria-hidden="true">
                  <svg viewBox="0 0 48 48" focusable="false">
                    <path d="M10 16h16"></path>
                    <path d="M34 16h4"></path>
                    <circle cx="30" cy="16" r="4"></circle>
                    <path d="M10 32h4"></path>
                    <path d="M22 32h16"></path>
                    <circle cx="18" cy="32" r="4"></circle>
                  </svg>
                </span>
                <span class="menu-item-copy">
                  <strong>设备设置</strong>
                  <small>管理灯光、亮度与设备偏好</small>
                </span>
              </button>
              <button class="menu-action menu-primary-action" type="button" data-menu-action="companion-copy">
                <span class="menu-action-icon" aria-hidden="true">
                  <svg viewBox="0 0 48 48" focusable="false">
                    <path d="M12 14h24v16H24l-8 6v-6h-4z"></path>
                    <path d="M33 9l2 5 5 2-5 2-2 5-2-5-5-2 5-2z"></path>
                  </svg>
                </span>
                <span class="menu-item-copy">
                  <strong>陪伴文案</strong>
                  <small>调整宝宝喜欢的陪伴表达</small>
                </span>
              </button>
            </div>
          </section>

          <section class="menu-section menu-secondary-section" aria-label="更多功能">
            <button class="menu-action menu-more-action" type="button" data-menu-action="more-settings">
              <span class="menu-action-icon" aria-hidden="true">
                <svg viewBox="0 0 48 48" focusable="false">
                  <circle cx="16" cy="16" r="4"></circle>
                  <circle cx="32" cy="16" r="4"></circle>
                  <circle cx="16" cy="32" r="4"></circle>
                  <circle cx="32" cy="32" r="4"></circle>
                </svg>
              </span>
              <span class="menu-item-copy">
                <strong>更多设置</strong>
                <small>客服、常见问题、版本、协议与购买合作</small>
              </span>
              <span class="menu-action-arrow" aria-hidden="true">›</span>
            </button>
          </section>

          <section class="history-panel" id="playHistoryPanel" aria-label="播放记录" aria-hidden="true" data-history-online="false">
            <div class="history-panel-head">
              <button class="history-back-button" id="closePlayHistoryButton" type="button" aria-label="返回功能中心">‹</button>
              <div>
                <p>播放记录</p>
                <small>最近 20 条已发送内容</small>
              </div>
              <span class="history-online-status is-offline">离线仅查看</span>
            </div>
            <div class="history-list" id="playHistoryList" role="list" aria-live="polite"></div>
            <div class="history-empty" id="playHistoryEmpty" hidden>
              <strong>暂无播放记录</strong>
              <small>设备在线发送内容后会出现在这里</small>
            </div>
            <p class="history-panel-hint" id="playHistoryHint" aria-live="polite"></p>
          </section>
        </aside>
      </main>
    </div>

    <script src="./app.js"></script>
  </body>
</html>

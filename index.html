<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>宝宝投影灯首页</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="stage-shell" id="stageShell">
      <main class="app" id="app" data-mode="story" aria-label="宝宝投影灯首页">
        <div class="scene-bg" id="sceneBg"></div>
        <div class="scene-vignette"></div>

        <header class="topbar" aria-label="设备状态">
          <div class="device-copy">
            <div class="device-name">
              <span>宝宝投影灯</span>
              <span class="online-dot" aria-label="在线"></span>
            </div>
            <div class="device-status">设备在线</div>
          </div>
          <button class="avatar-button" id="avatarButton" type="button" aria-label="打开个人菜单">
            <span class="avatar-face" aria-hidden="true">👦</span>
          </button>
        </header>

        <section class="mode-summary" aria-label="当前模式">
          <div class="mode-copy" id="modeCopy">
            <div class="mode-title-line">
              <span class="mode-symbol" id="modeSymbol" aria-hidden="true">📖</span>
              <h1 id="modeTitle">故事模式</h1>
            </div>
            <p id="modeSubtitle">会讲故事的好伙伴</p>
          </div>

          <div class="mini-actions" aria-label="快捷功能">
            <button class="mini-action" type="button" aria-label="灯光">
              <span class="mini-icon" aria-hidden="true">💡</span>
              <span>灯光</span>
            </button>
            <button class="mini-action muted" type="button" aria-label="静音">
              <img src="./图标/图标7.png" alt="" />
              <span>静音</span>
            </button>
          </div>
        </section>

        <nav class="mode-grid" aria-label="模式选择">
          <button class="mode-card is-active" type="button" data-mode="story" aria-label="故事模式">
            <img src="./图片/模式插图-故事模式.png" alt="" />
            <span>故事模式</span>
          </button>
          <button class="mode-card" type="button" data-mode="music" aria-label="儿歌模式">
            <img src="./图片/模式插图-音乐模式.png" alt="" />
            <span>儿歌模式</span>
          </button>
          <button class="mode-card" type="button" data-mode="sleep" aria-label="睡眠模式">
            <img src="./图片/模式插图-睡眠模式.png" alt="" />
            <span>睡眠模式</span>
          </button>
          <button class="mode-card" type="button" data-mode="parent" aria-label="亲子模式">
            <img src="./图片/模式插图-亲子模式.png" alt="" />
            <span>亲子模式</span>
          </button>
        </nav>

        <div class="page-dots" aria-hidden="true">
          <span class="is-active"></span>
          <span></span>
          <span></span>
        </div>

        <section class="play-panel" id="playPanel" aria-label="随机播放">
          <div class="play-left">
            <img class="play-glyph" id="playGlyph" src="./图标/图标6.png" alt="" />
            <div class="play-copy">
              <p id="playTitle">星星城堡历险记</p>
              <small id="playSubtitle">随机讲一个睡前故事</small>
            </div>
          </div>
          <button class="random-button" id="randomButton" type="button" aria-label="随机播放">
            <img src="./图标/图标1.png" alt="" />
            <span>随机播放</span>
          </button>
        </section>

        <section class="ai-panel" aria-label="AI生成">
          <img class="ai-spark" src="./图标/图标6.png" alt="" />
          <p id="aiPrompt">想听什么故事？</p>
          <button class="generate-button" id="generateButton" type="button" aria-label="立即生成">
            <span class="generate-spark" aria-hidden="true">✦</span>
            <span>立即生成</span>
          </button>
        </section>

        <footer class="quick-controls" aria-label="快捷控制">
          <button class="quick-control" type="button" data-popover="brightness" aria-label="投影亮度">
            <span class="quick-icon"><img src="./图标/图标5.png" alt="" /></span>
            <span>投影亮度</span>
          </button>
          <button class="quick-control" type="button" data-popover="volume" aria-label="音量">
            <span class="quick-icon"><img src="./图标/图标4.png" alt="" /></span>
            <span>音量</span>
          </button>
          <button class="quick-control is-on" type="button" aria-label="夜灯">
            <span class="quick-icon"><img src="./图标/图标3.png" alt="" /></span>
            <span>夜灯</span>
          </button>
          <button class="quick-control" type="button" aria-label="语音">
            <span class="quick-icon"><img src="./图标/图标2.png" alt="" /></span>
            <span>语音</span>
          </button>
        </footer>

        <div class="radial-popover" id="radialPopover" aria-hidden="true">
          <div class="radial-meter">
            <span id="radialValue">72</span>
          </div>
          <p id="radialLabel">投影亮度</p>
        </div>

        <div class="modal-backdrop" id="modalBackdrop" aria-hidden="true"></div>
        <section class="app-modal" id="appModal" role="dialog" aria-modal="true" aria-labelledby="randomModalTitle" aria-hidden="true" tabindex="-1">
          <div class="modal-panel is-active" data-panel="random">
            <div class="modal-kicker">随机播放</div>
            <h2 class="modal-title" id="randomModalTitle">今晚播放这个主题吗？</h2>
            <div class="random-theme-card">
              <div>
                <p id="randomThemeTitle">星星城堡历险记</p>
                <small id="randomThemeSubtitle">随机讲一个睡前故事</small>
              </div>
              <button class="swap-button" id="swapRandomButton" type="button">换一个</button>
            </div>
            <div class="modal-actions">
              <button class="modal-button secondary" id="cancelRandomButton" type="button">取消</button>
              <button class="modal-button primary" id="sendRandomButton" type="button">发送到设备播放</button>
            </div>
          </div>

          <div class="modal-panel" data-panel="generate">
            <div class="modal-kicker">AI 生成</div>
            <h2 class="modal-title" id="generateModalTitle">想让投影灯生成什么？</h2>
            <label class="generate-field" for="generateInput">
              <span>生成内容</span>
              <textarea id="generateInput" rows="4" placeholder="例如：想听一个关于小恐龙找月亮的睡前故事"></textarea>
            </label>
            <p class="generate-error" id="generateError" aria-live="polite"></p>
            <div class="modal-actions">
              <button class="modal-button secondary" id="cancelGenerateButton" type="button">取消</button>
              <button class="modal-button primary" id="submitGenerateButton" type="button">开始生成</button>
            </div>
          </div>

          <div class="modal-panel" data-panel="loading" aria-live="polite">
            <div class="loading-orb" aria-hidden="true"></div>
            <h2 class="modal-title" id="loadingModalTitle">正在生成内容</h2>
            <p class="loading-stage" id="loadingStage">正在理解你的需求</p>
            <small class="loading-hint">生成可能需要 20 秒到 3 分钟，请稍等一下</small>
          </div>

          <div class="modal-panel" data-panel="success" aria-live="polite">
            <div class="success-mark" aria-hidden="true">✓</div>
            <h2 class="modal-title" id="successModalTitle">生成成功</h2>
            <p class="success-copy" id="successCopy">新的内容已经准备好，可以开始播放了</p>
            <div class="modal-actions single">
              <button class="modal-button primary" id="finishGenerateButton" type="button">知道了</button>
            </div>
          </div>
        </section>

        <div class="menu-backdrop" id="menuBackdrop"></div>
        <aside class="side-menu" id="sideMenu" aria-label="个人菜单" aria-hidden="true">
          <div class="menu-profile">
            <div class="menu-avatar"><span>👦</span></div>
            <strong>小宇宙宝宝</strong>
            <small>今晚也有一盏灯陪着你</small>
          </div>
          <button type="button"><span>💬</span> 对话 <i></i></button>
          <button type="button"><span>👤</span> 我的</button>
          <button type="button"><span>⚙️</span> 设置</button>
          <button type="button"><span>❓</span> 帮助</button>
        </aside>
      </main>
    </div>

    <script src="./app.js"></script>
  </body>
</html>
